<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon 工具导航页</title>
    <link rel="icon" href="img/toolkit.svg" type="image/x-icon">
    <link rel="shortcut icon" href="img/toolkit.svg" type="image/x-icon">
    <link href="css/element-ui.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f6f8fb;
            --panel: #ffffff;
            --text: #172033;
            --muted: #6b7280;
            --line: #e6eaf0;
            --line-strong: #d7dee8;
            --primary: #2563eb;
            --primary-light: #eef4ff;
            --primary-hover: #1d4ed8;
            --radius: 16px;
            --shadow: 0 16px 36px rgba(17, 24, 39, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            min-width: 320px;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
            background: var(--bg);
        }

        button,
        input {
            font-family: inherit;
        }

        #app {
            min-height: 100vh;
        }

        .nav-page {
            min-height: 100vh;
            padding: 22px 18px 46px;
        }

        .nav-shell {
            width: min(560px, 100%);
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
            padding: 0 4px;
        }

        .brand-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            flex: 0 0 auto;
            border-radius: 11px;
            color: var(--primary);
            font-size: 18px;
            background: #ffffff;
            border: 1px solid var(--line);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.08);
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        .panel {
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 24px;
            background: var(--panel);
            box-shadow: var(--shadow);
        }

        .panel-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px;
            border-bottom: 1px solid var(--line);
            background: #fbfcfe;
        }

        .search-wrap {
            position: relative;
            flex: 1;
        }

        .search-wrap::before {
            content: "🔎";
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.55;
        }

        .search-input {
            width: 100%;
            height: 40px;
            padding: 0 12px 0 38px;
            border: 1px solid var(--line);
            outline: none;
            border-radius: 12px;
            color: var(--text);
            background: #ffffff;
            font-size: 14px;
            transition: border-color 0.18s ease, box-shadow 0.18s ease;
        }

        .search-input:focus {
            border-color: rgba(37, 99, 235, 0.42);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
        }

        .count-text {
            flex: 0 0 auto;
            color: var(--muted);
            font-size: 13px;
            white-space: nowrap;
        }

        .tool-list {
            padding: 8px;
        }

        .tool-item {
            width: 100%;
            min-height: 58px;
            display: flex;
            align-items: center;
            gap: 13px;
            padding: 10px 12px;
            border: 1px solid transparent;
            border-radius: 15px;
            color: inherit;
            text-align: left;
            background: transparent;
            cursor: pointer;
            transition: background 0.16s ease, border-color 0.16s ease, transform 0.16s ease;
        }

        .tool-item + .tool-item {
            margin-top: 3px;
        }

        .tool-item:hover {
            background: var(--primary-light);
            border-color: rgba(37, 99, 235, 0.18);
            transform: translateX(2px);
        }

        .tool-item:active {
            transform: translateX(1px);
        }

        .tool-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            width: 36px;
            height: 36px;
            border-radius: 12px;
            font-size: 18px;
            background: #f1f5f9;
        }

        .tool-main {
            min-width: 0;
            flex: 1;
        }

        .tool-title-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tool-title {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 15px;
            line-height: 1.35;
            font-weight: 700;
        }

        .tool-desc {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-top: 4px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.35;
        }

        .tool-category {
            flex: 0 0 auto;
            padding: 4px 8px;
            border-radius: 999px;
            color: #475569;
            font-size: 12px;
            line-height: 1;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
        }

        .open-arrow {
            flex: 0 0 auto;
            color: #94a3b8;
            font-size: 18px;
            transition: color 0.16s ease, transform 0.16s ease;
        }

        .tool-item:hover .open-arrow {
            color: var(--primary);
            transform: translateX(2px);
        }

        .empty-state {
            padding: 34px 20px 38px;
            color: var(--muted);
            text-align: center;
            font-size: 14px;
        }

        .iframe-page {
            position: fixed;
            inset: 0;
            z-index: 20;
            background: #ffffff;
        }

        .back-float {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 30;
            height: 34px;
            padding: 0 13px;
            border: 1px solid rgba(255, 255, 255, 0.58);
            border-radius: 10px;
            color: #0f172a;
            background: rgba(255, 255, 255, 0.86);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.12);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.16s ease, transform 0.16s ease, box-shadow 0.16s ease;
        }

        .back-float:hover {
            background: rgba(255, 255, 255, 0.96);
            transform: translateX(1px);
            box-shadow: 0 10px 22px rgba(15, 23, 42, 0.16);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }

        @media (max-width: 640px) {
            .nav-page {
                padding: 26px 12px 34px;
            }

            .header {
                gap: 10px;
                margin-bottom: 12px;
            }

            .brand-mark {
                width: 36px;
                height: 36px;
                font-size: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .panel-top {
                align-items: stretch;
                flex-direction: column;
            }

            .count-text {
                text-align: center;
            }

            .tool-item {
                min-height: 62px;
                padding: 10px;
            }

            .tool-desc {
                display: none;
            }

            .tool-category {
                display: none;
            }

            .back-float {
                top: 10px;
                left: 10px;
                height: 36px;
                padding: 0 12px;
            }
        }
    </style>
</head>
<body>
<div id="app">
    <section v-show="!iframe.show" class="nav-page">
        <div class="nav-shell">
            <header class="header">
                <div class="brand-mark">🧰</div>
                <h1>Amazon 工具导航</h1>
            </header>

            <main class="panel">
                <div class="panel-top">
                    <div class="search-wrap">
                        <input v-model="query" class="search-input" type="text" placeholder="搜索：毛利、表格、商标、专利、条码...">
                    </div>
                    <div class="count-text">{{ filteredTools.length }} / {{ tools.length }}</div>
                </div>

                <div v-if="filteredTools.length" class="tool-list">
                    <el-tooltip
                            v-for="tool in filteredTools"
                            :key="tool.key"
                            placement="right-start"
                            effect="light"
                            :open-delay="220">
                        <div slot="content">
                            <strong>{{ tool.title }}</strong><br>
                            <span>{{ tool.desc }}</span><br>
                            <span>网址：{{ toolsSrc[tool.key] }}</span>
                        </div>
                        <button class="tool-item" @click="launchTool(tool)">
                            <span class="tool-icon">{{ tool.icon }}</span>
                            <span class="tool-main">
                                <span class="tool-title-row">
                                    <span class="tool-title">{{ tool.title }}</span>
                                </span>
                                <span class="tool-desc">{{ tool.desc }}</span>
                            </span>
                            <span class="tool-category">{{ tool.category }}</span>
                            <span class="open-arrow">›</span>
                        </button>
                    </el-tooltip>
                </div>

                <div v-else class="empty-state">没有找到匹配的工具。</div>

            </main>
        </div>
    </section>

    <section v-if="iframe.show" class="iframe-page">
        <button class="back-float" @click="handleBack">← 返回</button>
        <iframe :src="iframe.src">
            <p>您的浏览器不支持 iframe 标签。</p>
        </iframe>
    </section>
</div>

<script src="js/vue.min.2.6.14.js"></script>
<script src="js/element-ui.js"></script>

<script>
    new Vue({
        el: '#app',
        data() {
            return {
                query: '',
                iframe: {
                    show: false,
                    src: ''
                },
                toolsSrc: {
                    amazon123: 'https://www.amz123.com',
                    hsCode: 'https://www.hsbianma.com',
                    copySiteExcel: 'https://linwenli95.github.io/onlineTools/tools/ExcelUtil/index.html',
                    unitConvert: 'https://linwenli95.github.io/onlineTools/tools/UnitConvert/index.html',
                    FBADeliveryFeeCalculation: 'https://linwenli95.github.io/onlineTools/tools/FBADeliveryFeeCalculation/index.html',
                    siteInfo: 'https://linwenli95.github.io/onlineTools/tools/Notes/index.html',
                    fireFlower: 'https://linwenli95.github.io/onlineTools/tools/Fireworks/index.html',
                    timeLine: 'https://linwenli95.github.io/onlineTools/tools/TimeLine/index.html',
                    pdfWeb: 'http://amztool.moyuren.cn/index',
                    pdfEditor: 'http://amztool.moyuren.cn',
                    patent: 'https://designdb.wipo.int/designdb/en/index.jsp',
                    uspto: 'https://tmsearch.uspto.gov',
                    ukipo: 'https://trademarks.ipo.gov.uk/ipo-tmtext',
                    imgWeightLoss: 'https://tinypng.com/',
                    barcode_pdfs: 'https://linwenli95.github.io/onlineTools/tools/barcode_pdfs/index.html'
                },
                // 后续增加工具：复制任意一条对象，修改 key/title/desc/category/icon/mode/tags 即可。
                tools: [
                    {
                        key: 'timeLine',
                        title: '我的计划制定',
                        desc: '用于任务节点、项目步骤和时间线规划。',
                        category: '计划',
                        icon: '📝',
                        mode: 'embed',
                        tags: ['计划', '时间线', '任务']
                    }, {
                        key: 'unitConvert',
                        title: '单位换算 / 毛利计算',
                        desc: '尺寸、重量、汇率、FBA 配送费、售价和毛利测算。',
                        category: '计算',
                        icon: '📦',
                        mode: 'embed',
                        tags: ['单位', '毛利', 'FBA', '售价', '汇率']
                    }, {
                        key: 'copySiteExcel',
                        title: '亚马逊表格工具',
                        desc: '按目标模板属性顺序重排表格数据，减少重复整理。',
                        category: '表格',
                        icon: '📊',
                        mode: 'embed',
                        tags: ['表格', '模板', '上架', 'Excel']
                    }, {
                        key: 'barcode_pdfs',
                        title: '条形码生成器',
                        desc: '生成亚马逊商品标签和条码 PDF。',
                        category: '标签',
                        icon: '🏷️',
                        mode: 'embed',
                        tags: ['条码', '标签', 'PDF', 'FNSKU']
                    }, {
                        key: 'siteInfo',
                        title: '各站点城市邮编',
                        desc: '站点币种、语言、网址、邮编、FBA/FBM 配送等信息。',
                        category: '资料',
                        icon: '📋',
                        mode: 'embed',
                        tags: ['站点', '邮编', '币种', 'FBA', 'FBM']
                    }, {
                        key: 'amazon123',
                        title: 'AMZ123 跨境卖家导航',
                        desc: '亚马逊工具集和跨境资讯导航。',
                        category: '导航',
                        icon: '🌎',
                        mode: 'embed',
                        tags: ['AMZ123', '跨境', '工具', '资讯']
                    }, {
                        key: 'hsCode',
                        title: '海关编码查询',
                        desc: '查询 HS Code，常用于货代发票和申报资料。',
                        category: '查询',
                        icon: '🔍',
                        mode: 'embed',
                        tags: ['海关编码', 'HSCode', '发票', '申报']
                    }, {
                        key: 'uspto',
                        title: '美标信息查询',
                        desc: '查询美国 USPTO 商标信息。',
                        category: '合规',
                        icon: '®️',
                        mode: 'embed',
                        tags: ['商标', '美国', 'USPTO', '品牌']
                    }, {
                        key: 'ukipo',
                        title: '英标信息查询',
                        desc: '查询英国 IPO 商标信息，外部页面打开。',
                        category: '合规',
                        icon: '🇬🇧',
                        mode: 'external',
                        tags: ['商标', '英国', 'UKIPO', '品牌']
                    }, {
                        key: 'patent',
                        title: '外观专利查询',
                        desc: '通过 WIPO DesignDB 查询外观设计专利信息。',
                        category: '合规',
                        icon: '💡',
                        mode: 'external',
                        tags: ['专利', '外观', 'WIPO', '侵权']
                    }, {
                        key: 'pdfEditor',
                        title: 'PDF 添加 Made In China',
                        desc: '快速给标签 PDF 添加 Made In China 文字。',
                        category: '标签',
                        icon: '⌨️',
                        mode: 'embed',
                        tags: ['PDF', 'Made in China', '标签']
                    }, {
                        key: 'fireFlower',
                        title: '一起看烟花吧',
                        desc: '打开可交互烟花页面，点击屏幕可放烟花。',
                        category: '娱乐',
                        icon: '🎇',
                        mode: 'embed',
                        tags: ['烟花', '放松', '娱乐']
                    }
                ]
            }
        },
        computed: {
            filteredTools() {
                const keyword = this.query.trim().toLowerCase();
                if (!keyword) return this.tools;
                return this.tools.filter(tool => {
                    const haystack = [
                        tool.title,
                        tool.desc,
                        tool.category,
                        ...(tool.tags || [])
                    ].join(' ').toLowerCase();
                    return haystack.includes(keyword);
                });
            }
        },
        methods: {
            launchTool(tool) {
                const url = this.toolsSrc[tool.key];
                if (!url) return;
                if (tool.mode === 'external') {
                    window.open(url, '_blank');
                    return;
                }
                this.iframe.show = true;
                this.iframe.src = url;
            },
            handleBack() {
                this.iframe.show = false;
                this.iframe.src = '';
            }
        }
    })
</script>
</body>
</html>
